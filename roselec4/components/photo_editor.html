<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f6f9;--card:#fff;--border:#dde3ec;--border2:#b8c4d0;
  --text:#1a1a1a;--text2:#555;--text3:#999;
  --blue:#1565C0;--blue2:#0D47A1;--bluebg:#E3F2FD;
  --green:#1B5E20;--greenbg:#E8F5E9;
  --red:#B71C1C;--redbg:#FFEBEE;
  --amber:#E65100;--amberbg:#FFF3E0;
  --orange:#E65100;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--bg);color:var(--text);font-size:13px;
  height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* TOPBAR */
.topbar{display:flex;align-items:center;gap:5px;padding:5px 8px;
  background:var(--blue);flex-wrap:wrap;flex-shrink:0;min-height:42px}
.logo{font-size:13px;font-weight:800;color:#fff;white-space:nowrap;margin-right:4px}
.logo span{color:#FFC107}
.sep{width:1px;height:16px;background:rgba(255,255,255,.3);margin:0 2px}
.btn{display:inline-flex;align-items:center;gap:3px;padding:4px 9px;
  border-radius:5px;font-size:11px;cursor:pointer;white-space:nowrap;
  transition:all .1s;border:none;font-weight:500}
.btn-g{background:rgba(255,255,255,.18);color:#fff}
.btn-g:hover{background:rgba(255,255,255,.28)}
.btn-g.on{background:rgba(255,255,255,.35);box-shadow:inset 0 0 0 1.5px #fff}
.btn-y{background:#FFC107;color:#1a1a1a}.btn-y:hover{background:#FFB300}
.btn-wa{background:#25D366;color:#fff}.btn-wa:hover{background:#1ebe5d}
.badge{padding:2px 8px;border-radius:8px;font-size:10px;font-weight:600;
  background:rgba(255,255,255,.2);color:#fff}

/* BODY */
.body{display:flex;flex:1;overflow:hidden}

/* SIDEBAR */
.lib{width:185px;background:var(--card);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.lib-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto}
.ltab{flex-shrink:0;padding:6px 8px;font-size:10px;font-weight:600;
  cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;transition:all .1s;white-space:nowrap}
.ltab.sel{color:var(--blue);border-bottom-color:var(--blue);background:var(--bluebg)}
.lib-body{flex:1;overflow-y:auto;padding:7px}
.ls-title{font-size:9px;font-weight:700;color:var(--text3);
  text-transform:uppercase;letter-spacing:.07em;margin:8px 0 4px}
.comp-card{display:flex;align-items:center;gap:5px;padding:4px 5px;
  border:1px solid var(--border);border-radius:5px;margin-bottom:3px;
  cursor:grab;background:var(--bg);transition:border-color .12s;user-select:none}
.comp-card:hover{border-color:var(--blue);background:var(--bluebg)}
.comp-thumb{width:42px;height:42px;border-radius:3px;overflow:hidden;
  flex-shrink:0;border:1px solid var(--border);background:#eee;
  display:flex;align-items:center;justify-content:center}
.comp-thumb svg,.comp-thumb img{width:100%;height:100%;object-fit:cover}
.comp-meta{flex:1;min-width:0}
.comp-name{font-size:10px;font-weight:600;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.comp-ref{font-size:9px;color:var(--text3)}
.upload-zone{border:1.5px dashed var(--border2);border-radius:5px;
  padding:8px;text-align:center;cursor:pointer;font-size:10px;color:var(--text3);
  margin-bottom:5px;transition:all .12s}
.upload-zone:hover{border-color:var(--blue);color:var(--blue)}
.cable-pal{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:3px}
.cb{width:20px;height:20px;border-radius:50%;cursor:pointer;
  border:2px solid transparent;transition:transform .1s}
.cb:hover,.cb.sel{transform:scale(1.2);border-color:#fff;box-shadow:0 0 0 1px #555}

/* CANVAS */
.canvas-wrap{flex:1;position:relative;overflow:hidden;
  background:#f0f2f5;
  background-image:radial-gradient(#c0c8d4 0.5px,transparent 0.5px);
  background-size:20px 20px}
#canvas-items{position:absolute;inset:0}
#canvas-svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
#wire-preview-svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}

/* Items sur canvas */
.ci{position:absolute;user-select:none}
.ci-body{border:2px solid transparent;border-radius:5px;
  background:#eee;overflow:hidden;position:relative;display:flex;
  flex-direction:column;align-items:center;justify-content:center}
.ci.selected .ci-body{border-color:var(--blue);box-shadow:0 0 0 3px rgba(21,101,192,.2)}
.ci svg,.ci img{display:block}
/* Label principal visible sur le composant */
.ci-main-label{position:absolute;bottom:0;left:0;right:0;
  background:rgba(0,0,0,.72);color:#fff;font-size:10px;font-weight:700;
  text-align:center;padding:2px 3px;white-space:nowrap;overflow:hidden;
  text-overflow:ellipsis;line-height:1.3}
.ci-sub-label{position:absolute;top:0;left:0;right:0;
  background:rgba(21,101,192,.85);color:#fff;font-size:9px;font-weight:600;
  text-align:center;padding:1px 3px;white-space:nowrap;overflow:hidden;
  text-overflow:ellipsis;line-height:1.3}
/* Indicateur état */
.ci-state{position:absolute;top:-6px;left:-2px;
  width:14px;height:14px;border-radius:50%;border:2px solid #fff;
  font-size:8px;display:flex;align-items:center;justify-content:center;font-weight:700}
.s-ok{background:#2E7D32;color:#fff}
.s-warn{background:#EF6C00;color:#fff}
.s-crit{background:#C62828;color:#fff}
/* Poignées de redimensionnement */
.resize-handle{position:absolute;width:10px;height:10px;
  background:var(--blue);border:2px solid #fff;border-radius:2px;
  cursor:se-resize;z-index:10}
.rh-se{bottom:-5px;right:-5px;cursor:se-resize}
.rh-s{bottom:-5px;left:50%;transform:translateX(-50%);cursor:s-resize}
.rh-e{right:-5px;top:50%;transform:translateY(-50%);cursor:e-resize}
/* Bouton supprimer */
.ci-del{position:absolute;top:-7px;right:-7px;background:#C62828;color:#fff;
  border:2px solid #fff;border-radius:50%;width:16px;height:16px;font-size:9px;
  cursor:pointer;display:none;align-items:center;justify-content:center;line-height:1;z-index:11}
.ci.selected .ci-del{display:flex}

/* PROPS */
.props{width:175px;background:var(--card);border-left:1px solid var(--border);
  display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0}
.ph{padding:7px 9px;border-bottom:1px solid var(--border);
  font-size:11px;font-weight:600;color:var(--text2);background:var(--bg);flex-shrink:0}
.pb{padding:8px 9px}
.pr{margin-bottom:7px}
.pr label{display:block;font-size:9px;font-weight:700;color:var(--text3);
  text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
.pr input,.pr select,.pr textarea{width:100%;padding:4px 6px;
  border:1px solid var(--border);border-radius:4px;
  background:#fafafa;color:var(--text);font-size:11px}
.pr textarea{resize:vertical;min-height:44px;line-height:1.4}
.pr-row{display:flex;gap:4px}
.pr-row input{flex:1}
.state-btns{display:flex;gap:3px}
.sb2{padding:3px 5px;border-radius:4px;font-size:9px;font-weight:700;
  cursor:pointer;border:1.5px solid transparent}
.sb-ok{background:var(--greenbg);color:var(--green)}
.sb-ok.a{border-color:var(--green)}
.sb-warn{background:var(--amberbg);color:var(--amber)}
.sb-warn.a{border-color:var(--amber)}
.sb-crit{background:var(--redbg);color:var(--red)}
.sb-crit.a{border-color:var(--red)}

/* STATUSBAR */
.sb{padding:3px 10px;background:var(--card);border-top:1px solid var(--border);
  display:flex;gap:8px;align-items:center;font-size:10px;color:var(--text2);flex-shrink:0;flex-wrap:wrap}
.sdot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:3px}
.ok{background:#2E7D32}.idle{background:#aaa}
.busy{background:#EF9F27;animation:p .7s infinite alternate}
@keyframes p{to{opacity:.3}}

/* MODAL */
.mo{position:fixed;inset:0;background:rgba(0,0,0,.45);
  display:flex;align-items:center;justify-content:center;z-index:200}
.md{background:var(--card);border-radius:10px;padding:18px;
  width:360px;max-width:95vw;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.md h3{font-size:13px;font-weight:600;margin-bottom:10px}
.mf{display:flex;gap:6px;justify-content:flex-end;margin-top:12px}

/* DCDB BOX preview */
.dcdb-preview{background:#1a1a1a;border-radius:5px;padding:8px;
  font-size:9px;color:#aaa;text-align:center;margin:4px 0}
</style>
</head>
<body>

<div class="topbar">
  <span class="logo">ROS<span>ELEC</span> · Photo</span>
  <div class="sep"></div>
  <button class="btn btn-g on" id="btn-select" onclick="setMode('select')">✦ Sélect.</button>
  <button class="btn btn-g" id="btn-cable" onclick="setMode('cable')">〜 Câble</button>
  <button class="btn btn-g" id="btn-text" onclick="setMode('text')">T Texte</button>
  <div class="sep"></div>
  <button class="btn btn-g" onclick="undo()">↩</button>
  <button class="btn btn-g" onclick="clearAll()">🗑</button>
  <div class="sep"></div>
  <button class="btn btn-g" onclick="saveLocal()">💾</button>
  <button class="btn btn-y" onclick="showExport()">📄 Export</button>
  <button class="btn btn-wa" onclick="shareWA()">📲 WA</button>
  <span class="badge" id="mode-badge">Sélection</span>
</div>

<div class="body">

<!-- BIBLIOTHÈQUE -->
<div class="lib">
  <div class="lib-tabs" id="lib-tabs">
    <div class="ltab sel" onclick="showTab('dc')">DC</div>
    <div class="ltab" onclick="showTab('ac')">AC</div>
    <div class="ltab" onclick="showTab('tel')">Télécom</div>
    <div class="ltab" onclick="showTab('dcdb')">DCDB</div>
    <div class="ltab" onclick="showTab('my')">+Photo</div>
  </div>
  <div class="lib-body" id="lib-body"></div>
</div>

<!-- CANVAS -->
<div class="canvas-wrap" id="cw">
  <div id="canvas-items"></div>
  <svg id="canvas-svg" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5"
        markerWidth="5" markerHeight="5" orient="auto-start-reverse">
        <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
          stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </marker>
    </defs>
    <g id="wires-g"></g>
    <g id="texts-g"></g>
  </svg>
  <svg id="wire-preview-svg" xmlns="http://www.w3.org/2000/svg">
    <line id="wp" x1="0" y1="0" x2="0" y2="0"
      stroke="#aaa" stroke-width="2.5" stroke-dasharray="6,3"
      stroke-linecap="round" opacity="0"/>
  </svg>
</div>

<!-- PROPS -->
<div class="props">
  <div class="ph" id="props-head">Propriétés</div>
  <div class="pb" id="props-body">
    <div style="color:var(--text3);font-size:11px;text-align:center;margin-top:16px">
      Cliquer un composant</div>
  </div>
</div>

</div>

<div class="sb">
  <span><span class="sdot idle" id="sdot"></span><span id="stxt">Prêt</span></span>
  <span id="cnt-i" style="color:var(--text3)">0 composant</span>
  <span id="cnt-w" style="color:var(--text3)">0 câble</span>
  <span style="margin-left:auto;font-size:9px;color:var(--text3)">
    S=sélect · C=câble · T=texte · Suppr=effacer · Ctrl+Z · Clic droit=annuler câble
  </span>
</div>

<!-- MODAL EXPORT -->
<div class="mo" id="mo-exp" style="display:none">
<div class="md">
  <h3>Exporter le schéma</h3>
  <div style="margin-bottom:8px"><label style="font-size:10px;color:var(--text3)">Titre</label>
    <input id="ex-t" style="width:100%;padding:4px 7px;border:1px solid var(--border);border-radius:4px;font-size:12px" placeholder="DCDB PEAGE MOUKONDO"></div>
  <div style="margin-bottom:8px"><label style="font-size:10px;color:var(--text3)">Site</label>
    <input id="ex-s" style="width:100%;padding:4px 7px;border:1px solid var(--border);border-radius:4px;font-size:12px" placeholder="PEAGE MOUKONDO"></div>
  <div style="margin-bottom:8px"><label style="font-size:10px;color:var(--text3)">Technicien</label>
    <input id="ex-tech" style="width:100%;padding:4px 7px;border:1px solid var(--border);border-radius:4px;font-size:12px" placeholder="Votre nom"></div>
  <div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px">
    <button class="btn" style="background:var(--blue);color:#fff;flex:1" onclick="exportPNG()">🖼 PNG</button>
    <button class="btn" style="background:#2E7D32;color:#fff;flex:1" onclick="exportSVGFile()">📄 SVG</button>
    <button class="btn" style="border:1px solid var(--border);flex:1" onclick="exportJSON()">{ } JSON</button>
  </div>
  <div class="mf">
    <button class="btn" style="border:1px solid var(--border)" onclick="document.getElementById('mo-exp').style.display='none'">Fermer</button>
  </div>
</div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// SVG COMPOSANTS RÉALISTES
// ═══════════════════════════════════════════════════════════

function svgDisj(brand, ampere, poles, state='ON') {
  const bc = {'CHNT':'#1a3f6b','HUA JIA':'#7a1a1a','TENGEN':'#1a4a1a','PHOENIX':'#8a2000'}[brand]||'#1a3f6b';
  const btnC = state==='ON'?'#1565C0':'#555';
  const btnT = state==='ON'?'I·ON':'O·OFF';
  if(poles===1) return `<svg viewBox="0 0 44 72" xmlns="http://www.w3.org/2000/svg">
    <rect x="1" y="1" width="42" height="70" rx="5" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
    <rect x="3" y="3" width="38" height="66" rx="4" fill="#f0f0f0"/>

    <text x="22" y="11" text-anchor="middle" font-size="6.5" fill="#fff" font-family="sans-serif" font-weight="700">${brand}</text>
    <text x="22" y="17" text-anchor="middle" font-size="5.5" fill="rgba(255,255,255,.8)" font-family="sans-serif">${ampere}</text>
    <rect x="8" y="22" width="28" height="26" rx="4" fill="${btnC}"/>
    <text x="22" y="33" text-anchor="middle" font-size="8" fill="#fff" font-family="sans-serif" font-weight="700">${btnT}</text>
    <rect x="12" y="38" width="20" height="6" rx="2" fill="rgba(0,0,0,.2)"/>
    <circle cx="15" cy="52" r="4.5" fill="#d0d0d0" stroke="#999" stroke-width=".8"/>
    <circle cx="29" cy="52" r="4.5" fill="#d0d0d0" stroke="#999" stroke-width=".8"/>
    <circle cx="15" cy="52" r="2.5" fill="#888"/>
    <circle cx="29" cy="52" r="2.5" fill="#888"/>
    <rect x="3" y="60" width="38" height="10" rx="0 0 4 4" fill="#ddd"/>
    <text x="22" y="68" text-anchor="middle" font-size="7" fill="#333" font-family="sans-serif" font-weight="600">${ampere} 1P</text>
    <line x1="22" y1="0" x2="22" y2="3" stroke="#cc0000" stroke-width="3" stroke-linecap="round"/>
    <line x1="22" y1="70" x2="22" y2="72" stroke="#1565C0" stroke-width="3" stroke-linecap="round"/>
  </svg>`;
  return `<svg viewBox="0 0 76 72" xmlns="http://www.w3.org/2000/svg">
    <rect x="1" y="1" width="74" height="70" rx="5" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
    <rect x="3" y="3" width="70" height="66" rx="4" fill="#f0f0f0"/>
    <rect x="3" y="3" width="70" height="16" rx="4" fill="${bc}"/>
    <text x="38" y="11" text-anchor="middle" font-size="6.5" fill="#fff" font-family="sans-serif" font-weight="700">${brand}</text>
    <text x="38" y="17" text-anchor="middle" font-size="5.5" fill="rgba(255,255,255,.8)" font-family="sans-serif">${ampere} ${poles}P</text>
    <rect x="8" y="22" width="26" height="26" rx="4" fill="${btnC}"/>
    <text x="21" y="33" text-anchor="middle" font-size="8" fill="#fff" font-family="sans-serif" font-weight="700">${btnT}</text>
    <rect x="42" y="22" width="26" height="26" rx="4" fill="${btnC}"/>
    <text x="55" y="33" text-anchor="middle" font-size="8" fill="#fff" font-family="sans-serif" font-weight="700">${btnT}</text>
    <circle cx="21" cy="54" r="4" fill="#d0d0d0" stroke="#999" stroke-width=".8"/>
    <circle cx="55" cy="54" r="4" fill="#d0d0d0" stroke="#999" stroke-width=".8"/>
    <circle cx="21" cy="54" r="2" fill="#888"/><circle cx="55" cy="54" r="2" fill="#888"/>
    <rect x="3" y="60" width="70" height="10" fill="#ddd"/>
    <text x="38" y="68" text-anchor="middle" font-size="7" fill="#333" font-family="sans-serif" font-weight="600">${ampere} ${poles}P</text>
    <line x1="21" y1="0" x2="21" y2="3" stroke="#cc0000" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="55" y1="0" x2="55" y2="3" stroke="#1a1a8a" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="21" y1="70" x2="21" y2="72" stroke="#1565C0" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="55" y1="70" x2="55" y2="72" stroke="#1565C0" stroke-width="2.5" stroke-linecap="round"/>
  </svg>`;
}

function svgDCDB() {
  return `<svg viewBox="0 0 160 100" xmlns="http://www.w3.org/2000/svg">

    <!-- Fusibles -->

    <rect x="60" y="12" width="10" height="10" rx="1" fill="#3a1a00" stroke="#ff9800" stroke-width=".5"/>

    <text x="65" y="43" text-anchor="middle" font-size="5" fill="#ff9800" font-family="sans-serif">F3</text>
    <text x="65" y="56" text-anchor="middle" font-size="5" fill="#ff9800" font-family="sans-serif">F4</text>
    <text x="65" y="69" text-anchor="middle" font-size="5" fill="#ff9800" font-family="sans-serif">F5</text>
    <text x="65" y="82" text-anchor="middle" font-size="5" fill="#ff9800" font-family="sans-serif">F6</text>
    <!-- Disjoncteurs DC -->
    <rect x="76" y="8" width="12" height="20" rx="2" fill="#1a3060"/>
    <rect x="90" y="8" width="12" height="20" rx="2" fill="#1a3060"/>
    <rect x="104" y="8" width="12" height="20" rx="2" fill="#1a3060"/>

let mode='select', activeTab='dc', activeCable=CABLES[0];

const canvasItems = document.getElementById('canvas-items');

const uid = () => 'e'+Date.now()+Math.floor(Math.random()*9999);
const snap = v => Math.round(v/20)*20;
const clone = o => JSON.parse(JSON.stringify(o));
function saveHist(){history.push(clone({items,wires,textItems}));if(history.length>30)history.shift();}
function getCwPos(e){const r=cw.getBoundingClientRect();const t=e.touches?.[0]||e;return{x:t.clientX-r.left,y:t.clientY-r.top};}

// ═══════════════════════════════════════════════════════════

function showTab(tab) {
  activeTab=tab;
  document.querySelectorAll('.ltab').forEach((t,i)=>{
    t.classList.toggle('sel',['dc','ac','tel','dcdb','my'][i]===tab);
  });
  renderLib();
}

function renderLib(){
  const body=document.getElementById('lib-body');
  body.innerHTML='';

  if(activeTab==='my'){
    body.innerHTML=`<label class="upload-zone"><input type="file" accept="image/*" multiple onchange="addMyPhotos(this.files)">
      <div style="font-size:20px;margin-bottom:4px">📷</div>
      <div>Charger photos<br>terrain comme<br>composants</div></label>
      <div id="my-list"></div>`;
    setTimeout(renderMyPhotos,10);
    return;
  }

  // Câbles
  body.innerHTML+=`<div class="ls-title">Câble actif</div>
    <div class="cable-pal" id="cpal"></div>
    <div id="clab" style="font-size:9px;color:var(--text3);margin-bottom:6px">${activeCable.l}</div>`;

  const comps=LIBRARY[activeTab]||[];
  body.innerHTML+=`<div class="ls-title">Composants</div>`;
  comps.forEach(comp=>{
    body.innerHTML+=`<div class="comp-card" onclick="addItem('${comp.id}','${activeTab}')" draggable="true"
      ondragstart="event.dataTransfer.setData('cid','${comp.id}');event.dataTransfer.setData('ctab','${activeTab}')">
      <div class="comp-thumb">${comp.svg}</div>
      <div class="comp-meta"><div class="comp-name">${comp.name}</div><div class="comp-ref">${comp.ref}</div></div>
    </div>`;
  });

  // Palette câbles
  setTimeout(()=>{
    const pal=document.getElementById('cpal');
    if(!pal)return;
    CABLES.forEach(c=>{
      const d=document.createElement('div');
      d.className='cb'+(c.k===activeCable.k?' sel':'');
      d.style.background=c.c; d.title=c.l;
      d.onclick=()=>{activeCable=c;document.querySelectorAll('.cb').forEach(x=>x.classList.remove('sel'));d.classList.add('sel');document.getElementById('clab').textContent=c.l;};
      pal.appendChild(d);
    });
  },10);
}

function renderMyPhotos(){
  const list=document.getElementById('my-list');if(!list)return;
  list.innerHTML=LIBRARY.my.map(c=>`<div class="comp-card" onclick="addItemFromComp(${JSON.stringify(c).replace(/"/g,'&quot;')})">
    <div class="comp-thumb"><img src="${c.imgSrc}" alt="${c.name}"></div>
    <div class="comp-meta"><div class="comp-name">${c.name}</div><div class="comp-ref">${c.ref}</div></div>
  </div>`).join('');
}

function addMyPhotos(files){
  Array.from(files).forEach(f=>{
    const r=new FileReader();
    r.onload=e=>{
      LIBRARY.my.push({id:'my_'+Date.now()+Math.random(),name:f.name.replace(/\.[^.]+$/,'').substring(0,16),ref:'Photo terrain',w:80,h:80,isPhoto:true,imgSrc:e.target.result,svg:null});
      renderMyPhotos();
    };r.readAsDataURL(f);
  });
}

// AJOUTER ITEM
// ═══════════════════════════════════════════════════════════
function addItem(compId, tab) {
  const comp=LIBRARY[tab]?.find(c=>c.id===compId);
  if(!comp)return;
  saveHist();
  const r=cw.getBoundingClientRect();
  const item={id:uid(),libId:compId,tab,
    x:snap(r.width/2-comp.w/2), y:snap(r.height/2-comp.h/2),
    w:comp.w, h:comp.h,
    label:comp.name, ref:comp.ref, ampere:'', section:'', state:'ok', note:'',
    svgContent:comp.svg, isPhoto:comp.isPhoto||false, imgSrc:comp.imgSrc||null};
  items.push(item);
  renderItem(item);
  updateCounts();
  selectItem(item.id);
}

function addItemFromComp(comp){
  saveHist();
  const r=cw.getBoundingClientRect();
  const item={id:uid(),libId:comp.id,tab:'my',
    x:snap(r.width/2-comp.w/2), y:snap(r.height/2-comp.h/2),
    w:comp.w, h:comp.h,
    label:comp.name, ref:comp.ref, ampere:'', section:'', state:'ok', note:'',
    svgContent:null, isPhoto:true, imgSrc:comp.imgSrc};
  items.push(item);
  renderItem(item);
  updateCounts();
  selectItem(item.id);
}

// ═══════════════════════════════════════════════════════════
// RENDER ITEM
// ═══════════════════════════════════════════════════════════
function renderItem(item){
  let el=document.getElementById(item.id);
  if(!el){el=document.createElement('div');el.id=item.id;el.className='ci';canvasItems.appendChild(el);}
  el.className='ci'+(selectedId===item.id?' selected':'');
  el.style.left=item.x+'px'; el.style.top=item.y+'px'; el.style.width=item.w+'px';

  const stC={ok:'s-ok',warn:'s-warn',crit:'s-crit'}[item.state||'ok'];
  const stI={ok:'✓',warn:'!',crit:'✕'}[item.state||'ok'];

  let content='';
  if(item.isPhoto && item.imgSrc){
    content=`<img src="${item.imgSrc}" style="width:${item.w}px;height:${item.h}px;object-fit:cover;display:block">`;
  } else {
    content=`<div style="width:${item.w}px;height:${item.h}px">${item.svgContent||''}</div>`;
  }

  // Label principal visible + ampérage
  const mainLabel = item.label + (item.ampere?' · '+item.ampere:'');
  // Sous-label = section câble si défini
  const subLabel  = item.section ? 'Section: '+item.section : '';

  el.innerHTML=`
    <div class="ci-body" style="width:${item.w}px;height:${item.h}px">
      ${content}
      ${subLabel?`<div class="ci-sub-label">${subLabel}</div>`:''}
      <div class="ci-main-label">${mainLabel}</div>
    </div>
    <div class="ci-state ${stC}">${stI}</div>
    <button class="ci-del" onclick="deleteItem('${item.id}')">✕</button>
    ${selectedId===item.id?`
    <div class="resize-handle rh-se" onmousedown="startResize(event,'${item.id}','se')"></div>
    <div class="resize-handle rh-s" onmousedown="startResize(event,'${item.id}','s')"></div>
    <div class="resize-handle rh-e" onmousedown="startResize(event,'${item.id}','e')"></div>
    `:''}`;

  el.addEventListener('mousedown',e=>onItemMD(e,item.id));
}

function renderAllItems(){items.forEach(renderItem);}

// ═══════════════════════════════════════════════════════════
// RESIZE
// ═══════════════════════════════════════════════════════════
function startResize(e, id, dir){
  e.stopPropagation(); e.preventDefault();
  const item=items.find(i=>i.id===id);
  resizing={id,dir,startW:item.w,startH:item.h,startX:e.clientX,startY:e.clientY};
}

document.addEventListener('mousemove',e=>{
  if(resizing){
    const item=items.find(i=>i.id===resizing.id);
    if(!item)return;
    const dx=e.clientX-resizing.startX, dy=e.clientY-resizing.startY;
    if(resizing.dir==='se'||resizing.dir==='e') item.w=Math.max(30,snap(resizing.startW+dx));
    if(resizing.dir==='se'||resizing.dir==='s') item.h=Math.max(20,snap(resizing.startH+dy));
    renderItem(item); return;
  }
  if(dragItem){
    const p=getCwPos(e);
    const item=items.find(i=>i.id===dragItem);
    if(item){item.x=snap(p.x-dragOff.x);item.y=snap(p.y-dragOff.y);
      const el=document.getElementById(item.id);
      if(el){el.style.left=item.x+'px';el.style.top=item.y+'px';}}
  }
  if(mode==='cable'&&cableStart){
    const p=getCwPos(e);
    wpLine.setAttribute('x2',snap(p.x));wpLine.setAttribute('y2',snap(p.y));
  }
});

document.addEventListener('mouseup',()=>{
  if(resizing){resizing=null;renderAllItems();}
  dragItem=null;
});

// ═══════════════════════════════════════════════════════════
// SELECTION & DRAG
// ═══════════════════════════════════════════════════════════
function selectItem(id){
  selectedId=id; renderAllItems(); renderAllWires();
  const item=items.find(i=>i.id===id);
  if(item)showProps(item); else hideProps();
}

function onItemMD(e,id){
  if(e.target.classList.contains('resize-handle')||e.target.classList.contains('ci-del'))return;
  if(mode!=='select')return;
  e.stopPropagation(); saveHist();
  selectItem(id);
  const p=getCwPos(e); const item=items.find(i=>i.id===id);
  dragItem=id; dragOff={x:p.x-item.x,y:p.y-item.y}; e.preventDefault();
}

  document.getElementById('props-head').textContent=item.label;

    <div class="pr"><label>Nom / Label</label>
      <input value="${item.label}" oninput="upI('${item.id}','label',this.value);renderItem(items.find(x=>x.id==='${item.id}'))"></div>

      <input value="${item.ampere||''}" placeholder="Ex: 20A / 100Ah"
        oninput="upI('${item.id}','ampere',this.value);renderItem(items.find(x=>x.id==='${item.id}'))"></div>
    <div class="pr"><label>Référence</label>
      <input value="${item.ref||''}" oninput="upI('${item.id}','ref',this.value)"></div>
    <div class="pr"><label>Section câble</label>
      <input value="${item.section||''}" placeholder="Ex: 16mm² · 3m"
        oninput="upI('${item.id}','section',this.value);renderItem(items.find(x=>x.id==='${item.id}'))"></div>
    <div class="pr"><label>État</label>
      <div class="state-btns">
        <div class="sb2 sb-ok ${stOk}" onclick="upI('${item.id}','state','ok');selectItem('${item.id}')">✅ OK</div>
        <div class="sb2 sb-warn ${stW}" onclick="upI('${item.id}','state','warn');selectItem('${item.id}')">⚠️</div>
        <div class="sb2 sb-crit ${stC}" onclick="upI('${item.id}','state','crit');selectItem('${item.id}')">🔴</div>
      </div></div>
    <div class="pr"><label>Note / Observation</label>
      <textarea oninput="upI('${item.id}','note',this.value)"
        placeholder="Anomalies, mesures...">${item.note||''}</textarea></div>
    <div class="pr"><label>Taille (L × H px)</label>
      <div class="pr-row">
        <input type="number" value="${item.w}" min="20" max="400" placeholder="L"
          oninput="upI('${item.id}','w',+this.value);renderItem(items.find(x=>x.id==='${item.id}'))">
        <input type="number" value="${item.h}" min="20" max="400" placeholder="H"
          oninput="upI('${item.id}','h',+this.value);renderItem(items.find(x=>x.id==='${item.id}'))">
      </div></div>`;
}

function hideProps(){
  document.getElementById('props-head').textContent='Propriétés';
  document.getElementById('props-body').innerHTML=`<div style="color:var(--text3);font-size:11px;text-align:center;margin-top:16px">Cliquer un composant</div>`;
}

function upI(id,k,v){const item=items.find(i=>i.id===id);if(item)item[k]=v;}

// ═══════════════════════════════════════════════════════════
// CANVAS EVENTS
// ═══════════════════════════════════════════════════════════
cw.addEventListener('click',e=>{
  const onItem=e.target.closest('.ci');
  if(onItem&&mode==='select')return;
  if(onItem&&mode!=='cable')return;

  const p=getCwPos(e);
  const sx=snap(p.x), sy=snap(p.y);

  if(mode==='cable'){
    if(!cableStart){
      cableStart={x:sx,y:sy};
      wpLine.setAttribute('x1',sx);wpLine.setAttribute('y1',sy);
      wpLine.setAttribute('x2',sx);wpLine.setAttribute('y2',sy);
      wpLine.setAttribute('stroke',activeCable.c);wpLine.setAttribute('opacity','0.8');
      setStatus('Cliquer point d\'arrivée · Clic droit pour terminer');
    } else {
      if(sx===cableStart.x&&sy===cableStart.y){cableStart=null;wpLine.setAttribute('opacity','0');return;}
      saveHist();
      wires.push({id:uid(),x1:cableStart.x,y1:cableStart.y,x2:sx,y2:sy,
        color:activeCable.c,colorLabel:activeCable.l,section:'',distance:''});
      renderAllWires();
      cableStart={x:sx,y:sy};
      wpLine.setAttribute('x1',sx);wpLine.setAttribute('y1',sy);
      updateCounts();
    }
  } else if(mode==='text'){
    const txt=prompt('Texte / annotation :','');
    if(!txt)return;
    saveHist();
    textItems.push({id:uid(),x:sx,y:sy,text:txt,size:12});
    renderAllTexts();
  } else {
    if(!e.target.closest('.ci')){selectedId=null;renderAllItems();renderAllWires();hideProps();}
  }
});

cw.addEventListener('contextmenu',e=>{e.preventDefault();cableStart=null;wpLine.setAttribute('opacity','0');setStatus('Câble terminé');});

cw.addEventListener('dragover',e=>e.preventDefault());
cw.addEventListener('drop',e=>{
  e.preventDefault();
  const cid=e.dataTransfer.getData('cid'), ctab=e.dataTransfer.getData('ctab');
  const comp=LIBRARY[ctab]?.find(c=>c.id===cid);if(!comp)return;
  const p=getCwPos(e); saveHist();
  const item={id:uid(),libId:comp.id,tab:ctab,
    x:snap(p.x-comp.w/2),y:snap(p.y-comp.h/2),
    w:comp.w,h:comp.h,label:comp.name,ref:comp.ref,
    ampere:'',section:'',state:'ok',note:'',
    svgContent:comp.svg,isPhoto:comp.isPhoto||false,imgSrc:comp.imgSrc||null};
  items.push(item);renderItem(item);updateCounts();selectItem(item.id);
});

// ═══════════════════════════════════════════════════════════
// WIRES + SECTION/DISTANCE
// ═══════════════════════════════════════════════════════════
function renderAllWires(){
  wiresG.innerHTML='';
  wires.forEach(w=>{
    const line=document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',w.x1);line.setAttribute('y1',w.y1);
    line.setAttribute('x2',w.x2);line.setAttribute('y2',w.y2);
    line.setAttribute('stroke',w.color);
    line.setAttribute('stroke-width',selectedId===w.id?'4.5':'3');
    line.setAttribute('stroke-linecap','round');
    if(selectedId===w.id)line.setAttribute('stroke-dasharray','8,3');
    line.style.cursor='pointer';
    line.addEventListener('click',()=>{if(mode==='select'){selectedId=w.id;renderAllWires();showWireProps(w);}});
    wiresG.appendChild(line);

    // Label câble (type + section + distance)
    const mx=(w.x1+w.x2)/2, my=(w.y1+w.y2)/2;
    let lbl=w.colorLabel;
    if(w.section)lbl+=' · '+w.section;
    if(w.distance)lbl+=' · '+w.distance;
    const bw=lbl.length*5.5+8;
    const bg=document.createElementNS('http://www.w3.org/2000/svg','rect');
    bg.setAttribute('x',mx-bw/2);bg.setAttribute('y',my-8);
    bg.setAttribute('width',bw);bg.setAttribute('height',14);
    bg.setAttribute('rx','3');bg.setAttribute('fill',w.color);bg.setAttribute('opacity','0.88');
    const txt=document.createElementNS('http://www.w3.org/2000/svg','text');
    txt.setAttribute('x',mx);txt.setAttribute('y',my+2.5);
    txt.setAttribute('text-anchor','middle');txt.setAttribute('font-size','8');
    txt.setAttribute('fill','#fff');txt.setAttribute('font-family','sans-serif');
    txt.setAttribute('font-weight','700');txt.setAttribute('pointer-events','none');
    txt.textContent=lbl;
    wiresG.appendChild(bg);wiresG.appendChild(txt);
  });
}

function showWireProps(w){
  document.getElementById('props-head').textContent='Câble';
  document.getElementById('props-body').innerHTML=`
    <div class="pr"><label>Type / Couleur</label>
      <input value="${w.colorLabel}" readonly style="opacity:.6"></div>
    <div class="pr"><label>Section (ex: 16mm²)</label>
      <input value="${w.section||''}" placeholder="Ex: 16mm² · 4mm²"
        oninput="upW('${w.id}','section',this.value)"></div>
    <div class="pr"><label>Distance / Longueur</label>
      <input value="${w.distance||''}" placeholder="Ex: 3m · 1.5m"
        oninput="upW('${w.id}','distance',this.value)"></div>
    <div class="pr"><label>Note</label>
      <input value="${w.note||''}" placeholder="Remarque..."
        oninput="upW('${w.id}','note',this.value)"></div>
    <button class="btn" style="background:var(--red);color:#fff;width:100%;margin-top:6px;font-size:11px"
      onclick="deleteWire('${w.id}')">🗑 Supprimer ce câble</button>`;
}

function upW(id,k,v){
  const w=wires.find(x=>x.id===id);
  if(w){w[k]=v;renderAllWires();}
}

// ═══════════════════════════════════════════════════════════
// TEXTES SVG
// ═══════════════════════════════════════════════════════════
function renderAllTexts(){
  textsG.innerHTML='';
  textItems.forEach(t=>{
    const txt=document.createElementNS('http://www.w3.org/2000/svg','text');
    txt.setAttribute('x',t.x);txt.setAttribute('y',t.y);
    txt.setAttribute('font-size',t.size||12);txt.setAttribute('fill','#1a1a1a');
    txt.setAttribute('font-family','sans-serif');txt.setAttribute('font-weight','600');
    txt.setAttribute('cursor','pointer');
    txt.textContent=t.text;
    txt.addEventListener('click',()=>{if(mode==='select')selectText(t.id);});
    textsG.appendChild(txt);
  });
}

function selectText(id){
  selectedId=id;
  const t=textItems.find(x=>x.id===id);if(!t)return;
  document.getElementById('props-head').textContent='Texte';
  document.getElementById('props-body').innerHTML=`
    <div class="pr"><label>Contenu</label>
      <input value="${t.text}" oninput="upT('${t.id}','text',this.value)"></div>
    <div class="pr"><label>Taille police</label>
      <input type="number" value="${t.size||12}" min="8" max="28" oninput="upT('${t.id}','size',+this.value)"></div>
    <button class="btn" style="background:var(--red);color:#fff;width:100%;margin-top:6px;font-size:11px"
      onclick="textItems=textItems.filter(x=>x.id!=='${t.id}');renderAllTexts();hideProps()">🗑 Supprimer</button>`;
}

function upT(id,k,v){const t=textItems.find(x=>x.id===id);if(t){t[k]=v;renderAllTexts();}}

// ═══════════════════════════════════════════════════════════
// MODE
// ═══════════════════════════════════════════════════════════
function setMode(m){
  mode=m; cableStart=null; wpLine.setAttribute('opacity','0');
  ['select','cable','text'].forEach(x=>document.getElementById('btn-'+x)?.classList.remove('on'));
  document.getElementById('btn-'+m)?.classList.add('on');
  const L={select:'Sélection · déplacer · redimensionner',cable:'Câble — cliquer départ',text:'Texte libre'};
  document.getElementById('mode-badge').textContent=L[m]||m;
  cw.style.cursor=m==='cable'?'crosshair':m==='text'?'text':'default';
  setStatus(L[m]||m);
}

// ═══════════════════════════════════════════════════════════
// KEYBOARD
// ═══════════════════════════════════════════════════════════
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
  if(e.key==='s'||e.key==='S')setMode('select');
  if(e.key==='c'||e.key==='C')setMode('cable');
  if(e.key==='t'||e.key==='T')setMode('text');
  if(e.key==='Delete'||e.key==='Backspace'){deleteItem(selectedId);deleteWire(selectedId);}
  if(e.ctrlKey&&e.key==='z'){e.preventDefault();undo();}
  if(e.key==='Escape'){cableStart=null;wpLine.setAttribute('opacity','0');}
});

function deleteItem(id){
  if(!id)return;
  const idx=items.findIndex(i=>i.id===id);if(idx<0)return;
  saveHist();items.splice(idx,1);
  document.getElementById(id)?.remove();
  selectedId=null;hideProps();updateCounts();
}

function deleteWire(id){
  if(!id)return;
  const idx=wires.findIndex(w=>w.id===id);if(idx<0)return;
  saveHist();wires.splice(idx,1);renderAllWires();
  selectedId=null;hideProps();updateCounts();
}

function clearAll(){
  if(!confirm('Effacer tout ?'))return;
  saveHist();items=[];wires=[];textItems=[];
  canvasItems.innerHTML='';wiresG.innerHTML='';textsG.innerHTML='';
  selectedId=null;hideProps();updateCounts();
}

function undo(){
  if(!history.length){setStatus('Rien à annuler');return;}
  const p=history.pop();items=p.items;wires=p.wires;textItems=p.textItems;
  canvasItems.innerHTML='';wiresG.innerHTML='';textsG.innerHTML='';
  // Restaurer SVG depuis lib
  items.forEach(item=>{
    if(!item.svgContent&&!item.isPhoto){
      const allC=[...LIBRARY.dc,...LIBRARY.ac,...LIBRARY.tel,...LIBRARY.dcdb];
      const c=allC.find(x=>x.id===item.libId);if(c)item.svgContent=c.svg;
    }
  });
  renderAllItems();renderAllWires();renderAllTexts();
  selectedId=null;hideProps();updateCounts();setStatus('Annulé','ok');
}

// ═══════════════════════════════════════════════════════════
// STATUS
// ═══════════════════════════════════════════════════════════
function setStatus(msg,t='idle'){
  document.getElementById('stxt').textContent=msg;
  document.getElementById('sdot').className='sdot '+(t==='ok'?'ok':t==='busy'?'busy':'idle');
}
function updateCounts(){
  document.getElementById('cnt-i').textContent=items.length+' composant'+(items.length>1?'s':'');
  document.getElementById('cnt-w').textContent=wires.length+' câble'+(wires.length>1?'s':'');
}

// ═══════════════════════════════════════════════════════════
// SAVE / EXPORT
// ═══════════════════════════════════════════════════════════
function saveLocal(){
  try{localStorage.setItem('roselec_photo_v2',JSON.stringify({items:items.map(i=>({...i,svgContent:null})),wires,textItems,savedAt:new Date().toISOString()}));setStatus('Sauvegardé','ok');setTimeout(()=>setStatus('Prêt'),2000);}catch(e){setStatus('Erreur sauvegarde');}
  window.parent?.postMessage({type:'save_photo_schema',payload:{items,wires,textItems}},'*');
}
setInterval(saveLocal,60000);

function showExport(){document.getElementById('mo-exp').style.display='flex';}

function buildSVG(){
  const title=document.getElementById('ex-t').value||'Schéma ROSELEC';
  const site=document.getElementById('ex-s').value||'';
  const tech=document.getElementById('ex-tech').value||'';
  const now=new Date().toLocaleDateString('fr-FR');
  let mnX=9999,mnY=9999,mxX=0,mxY=0;
  items.forEach(i=>{mnX=Math.min(mnX,i.x);mnY=Math.min(mnY,i.y);mxX=Math.max(mxX,i.x+i.w);mxY=Math.max(mxY,i.y+i.h+30);});
  wires.forEach(w=>{mnX=Math.min(mnX,w.x1,w.x2);mnY=Math.min(mnY,w.y1,w.y2);mxX=Math.max(mxX,w.x1,w.x2);mxY=Math.max(mxY,w.y1,w.y2);});
  if(mnX===9999){mnX=0;mnY=0;mxX=500;mxY=300;}
  const pad=40,W=mxX-mnX+pad*2,H=mxY-mnY+pad*2+56;
  const dx=pad-mnX,dy=pad-mnY+56;
  let isvg='',wsvg='';
  items.forEach(item=>{
    if(!item.isPhoto&&item.svgContent){
      isvg+=`<g transform="translate(${item.x+dx},${item.y+dy})">${item.svgContent}</g>`;
      const lbl=item.label+(item.ampere?' · '+item.ampere:'');
      isvg+=`<rect x="${item.x+dx}" y="${item.y+dy+item.h}" width="${item.w}" height="14" fill="rgba(0,0,0,.7)" rx="0 0 3 3"/>`;
      isvg+=`<text x="${item.x+dx+item.w/2}" y="${item.y+dy+item.h+10}" text-anchor="middle" font-size="9" fill="#fff" font-family="sans-serif" font-weight="700">${lbl}</text>`;
    }
  });
  wires.forEach(w=>{
    let lbl=w.colorLabel;if(w.section)lbl+=' · '+w.section;if(w.distance)lbl+=' · '+w.distance;
    wsvg+=`<line x1="${w.x1+dx}" y1="${w.y1+dy}" x2="${w.x2+dx}" y2="${w.y2+dy}" stroke="${w.color}" stroke-width="3" stroke-linecap="round"/>`;
    const mx=(w.x1+w.x2)/2+dx,my=(w.y1+w.y2)/2+dy,bw=lbl.length*5.5+8;
    wsvg+=`<rect x="${mx-bw/2}" y="${my-8}" width="${bw}" height="14" rx="3" fill="${w.color}" opacity=".88"/>`;
    wsvg+=`<text x="${mx}" y="${my+3}" text-anchor="middle" font-size="8" fill="#fff" font-family="sans-serif" font-weight="700">${lbl}</text>`;
  });
  textItems.forEach(t=>{
    isvg+=`<text x="${t.x+dx}" y="${t.y+dy}" font-size="${t.size||12}" fill="#1a1a1a" font-family="sans-serif" font-weight="600">${t.text}</text>`;
  });
  return `<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">
  <rect width="${W}" height="${H}" fill="#f8f9fa"/>
  <rect width="${W}" height="52" fill="#1565C0"/>
  <text x="16" y="22" font-size="15" fill="#fff" font-family="sans-serif" font-weight="800">ROSELEC — ${title}</text>
  <text x="16" y="40" font-size="10" fill="rgba(255,255,255,.75)" font-family="sans-serif">${site} · ${tech} · ${now}</text>
  ${wsvg}${isvg}
</svg>`;
}

function exportPNG(){
  const svg=buildSVG();const img=new Image();
  img.onload=()=>{
    const c=document.createElement('canvas');c.width=img.width*2;c.height=img.height*2;
    const ctx=c.getContext('2d');ctx.scale(2,2);ctx.drawImage(img,0,0);
    const a=document.createElement('a');a.href=c.toDataURL('image/png');
    a.download='roselec_'+Date.now()+'.png';a.click();setStatus('PNG exporté','ok');
  };
  img.src=URL.createObjectURL(new Blob([svg],{type:'image/svg+xml'}));
  document.getElementById('mo-exp').style.display='none';
}

function exportSVGFile(){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([buildSVG()],{type:'image/svg+xml'}));
  a.download='roselec_'+Date.now()+'.svg';a.click();
  document.getElementById('mo-exp').style.display='none';
}

function exportJSON(){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify({items,wires,textItems},null,2)],{type:'application/json'}));
  a.download='roselec_'+Date.now()+'.json';a.click();
  document.getElementById('mo-exp').style.display='none';
}

function shareWA(){
  const site=document.getElementById('ex-s').value||'Site';
  const tech=document.getElementById('ex-tech').value||'Tech';
  const states=items.map(i=>({ok:'✅',warn:'⚠️',crit:'❌'}[i.state||'ok']+' '+i.label+(i.ampere?' ('+i.ampere+')':'')).join('\n  ');
  const winfo=wires.map(w=>w.colorLabel+(w.section?' '+w.section:'')+(w.distance?' '+w.distance:'')).join(', ');
  const msg=`⚡ *ROSELEC — Schéma photo-réaliste*\n━━━━━━━━━━━━━━━━━━━━\n👷 *${tech}* · 📍 *${site}*\n📅 ${new Date().toLocaleString('fr-FR')}\n━━━━━━━━━━━━━━━━━━━━\n📦 *${items.length} composant(s) :*\n  ${states||'aucun'}\n🔌 *${wires.length} câble(s) :* ${winfo||'aucun'}\n━━━━━━━━━━━━━━━━━━━━\n_ROSELEC · MTN Congo Zone Sud_`;
  window.open('https://wa.me/?text='+encodeURIComponent(msg),'_blank');
}

// INIT
renderLib();setMode('select');setStatus('Prêt — glisser les composants ou cliquer pour placer');
</script>
