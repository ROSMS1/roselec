<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f4f6f9;--card:#fff;--border:#dde3ec;--border2:#b8c4d0;
  --text:#1a1a1a;--text2:#555;--text3:#999;
  --blue:#1565C0;--blue2:#0D47A1;--bluebg:#E3F2FD;
  --green:#1B5E20;--greenbg:#E8F5E9;
  --red:#B71C1C;--redbg:#FFEBEE;
  --amber:#E65100;--amberbg:#FFF3E0;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:var(--bg);color:var(--text);font-size:13px;
  height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* ── TOPBAR ── */
.topbar{display:flex;align-items:center;gap:6px;padding:6px 10px;
  background:var(--blue);flex-wrap:wrap;flex-shrink:0;min-height:44px}
.logo{font-size:14px;font-weight:800;color:#fff;white-space:nowrap}
.logo span{color:#FFC107}
.sep{width:1px;height:18px;background:rgba(255,255,255,.3);margin:0 2px}
.btn{display:inline-flex;align-items:center;gap:4px;padding:5px 11px;
  border-radius:6px;font-size:12px;cursor:pointer;white-space:nowrap;
  transition:all .1s;border:none;font-weight:500}
.btn-ghost{background:rgba(255,255,255,.18);color:#fff}
.btn-ghost:hover{background:rgba(255,255,255,.28)}
.btn-ghost.on{background:rgba(255,255,255,.35);box-shadow:inset 0 0 0 1.5px #fff}
.btn-yellow{background:#FFC107;color:#1a1a1a}
.btn-yellow:hover{background:#FFB300}
.btn-green{background:#25D366;color:#fff}
.btn-green:hover{background:#1ebe5d}
.btn-red{background:rgba(198,40,40,.7);color:#fff}
.badge-mode{padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600;
  background:rgba(255,255,255,.2);color:#fff;white-space:nowrap}

/* ── BODY ── */
.body{display:flex;flex:1;overflow:hidden}

/* ── SIDEBAR BIBLIOTHÈQUE ── */
.lib{width:190px;background:var(--card);border-right:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;flex-shrink:0}
.lib-tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.ltab{flex:1;padding:7px 4px;font-size:10px;font-weight:600;text-align:center;
  cursor:pointer;color:var(--text3);border-bottom:2px solid transparent;transition:all .1s}
.ltab.sel{color:var(--blue);border-bottom-color:var(--blue);background:var(--bluebg)}
.lib-body{flex:1;overflow-y:auto;padding:8px}
.lib-section{margin-bottom:10px}
.ls-title{font-size:9px;font-weight:700;color:var(--text3);
  text-transform:uppercase;letter-spacing:.07em;margin-bottom:5px}

/* Composant dans bibliothèque */
.comp-card{display:flex;align-items:center;gap:6px;padding:5px 6px;
  border:1px solid var(--border);border-radius:6px;margin-bottom:4px;
  cursor:grab;background:var(--bg);transition:border-color .12s;user-select:none}
.comp-card:hover{border-color:var(--blue);background:var(--bluebg)}
.comp-card.dragging{opacity:.5}
.comp-thumb{width:44px;height:44px;border-radius:4px;overflow:hidden;
  flex-shrink:0;border:1px solid var(--border);background:#eee;
  display:flex;align-items:center;justify-content:center}
.comp-thumb svg{width:100%;height:100%}
.comp-thumb img{width:100%;height:100%;object-fit:cover}
.comp-meta{flex:1;min-width:0}
.comp-name{font-size:10px;font-weight:600;color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.comp-ref{font-size:9px;color:var(--text3)}

/* Upload zone */
.upload-zone{border:1.5px dashed var(--border2);border-radius:6px;
  padding:10px;text-align:center;cursor:pointer;font-size:10px;
  color:var(--text3);margin-bottom:6px;transition:all .12s}
.upload-zone:hover{border-color:var(--blue);color:var(--blue)}
.upload-zone input{display:none}

/* Palette câbles */
.cable-pal{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:4px}
.cb{width:22px;height:22px;border-radius:50%;cursor:pointer;
  border:2px solid transparent;transition:transform .1s}
.cb:hover,.cb.sel{transform:scale(1.2);border-color:#fff;
  box-shadow:0 0 0 1px #555}
.cb-label{font-size:9px;color:var(--text3);margin-top:2px}

/* ── CANVAS ── */
.canvas-wrap{flex:1;position:relative;overflow:hidden;background:#f0f2f5;
  background-image:radial-gradient(#c0c8d4 0.6px,transparent 0.6px);
  background-size:20px 20px}
#cvs{position:absolute;inset:0;width:100%;height:100%}
#cvs-svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
.wire-preview-svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}

/* Composant sur canvas */
.canvas-item{position:absolute;cursor:default;user-select:none}
.canvas-item .ci-img{border-radius:5px;border:2px solid transparent;
  display:block;background:#eee;overflow:hidden}
.canvas-item .ci-img svg,.canvas-item .ci-img img{
  display:block;width:100%;height:100%}
.canvas-item.selected .ci-img{border-color:var(--blue);
  box-shadow:0 0 0 3px rgba(21,101,192,.25)}
.canvas-item .ci-label{position:absolute;top:calc(100% + 3px);left:50%;
  transform:translateX(-50%);background:rgba(10,10,10,.75);color:#fff;
  font-size:9px;padding:2px 6px;border-radius:3px;white-space:nowrap;
  pointer-events:none}
.canvas-item .ci-badge{position:absolute;top:-7px;right:-7px;
  background:var(--blue);color:#fff;font-size:8px;font-weight:700;
  padding:1px 5px;border-radius:8px;white-space:nowrap;pointer-events:none}
.canvas-item .ci-state{position:absolute;top:-7px;left:-2px;
  width:14px;height:14px;border-radius:50%;border:2px solid #fff;
  font-size:8px;display:flex;align-items:center;justify-content:center}
.state-ok{background:#2E7D32}
.state-warn{background:#EF6C00}
.state-crit{background:#C62828}
.canvas-item .ci-del{position:absolute;top:-7px;right:-7px;
  background:#C62828;color:#fff;border:none;border-radius:50%;
  width:15px;height:15px;font-size:9px;cursor:pointer;display:none;
  align-items:center;justify-content:center;line-height:1}
.canvas-item.selected .ci-del{display:flex}

/* ── PANNEAU PROPS ── */
.props{width:170px;background:var(--card);border-left:1px solid var(--border);
  display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0}
.props-head{padding:8px 10px;border-bottom:1px solid var(--border);
  font-size:11px;font-weight:600;color:var(--text2);background:var(--bg);flex-shrink:0}
.props-body{padding:8px 10px;flex:1}
.pr{margin-bottom:8px}
.pr label{display:block;font-size:9px;font-weight:600;color:var(--text3);
  text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.pr input,.pr select,.pr textarea{width:100%;padding:4px 7px;
  border:1px solid var(--border);border-radius:4px;
  background:#fafafa;color:var(--text);font-size:11px}
.pr textarea{resize:vertical;min-height:48px;line-height:1.4}
.state-select{display:flex;gap:4px;flex-wrap:wrap}
.ss-btn{padding:3px 6px;border-radius:4px;font-size:9px;font-weight:600;
  cursor:pointer;border:1px solid transparent;transition:all .1s}
.ss-ok{background:var(--greenbg);color:var(--green)}
.ss-ok.active{border-color:var(--green)}
.ss-warn{background:var(--amberbg);color:var(--amber)}
.ss-warn.active{border-color:var(--amber)}
.ss-crit{background:var(--redbg);color:var(--red)}
.ss-crit.active{border-color:var(--red)}

/* ── STATUSBAR ── */
.sb{padding:3px 10px;background:var(--card);border-top:1px solid var(--border);
  display:flex;gap:10px;align-items:center;font-size:11px;color:var(--text2);
  flex-shrink:0;flex-wrap:wrap}
.sdot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:3px}
.ok{background:#2E7D32}.idle{background:#aaa}
.busy{background:#EF9F27;animation:pulse .7s infinite alternate}
@keyframes pulse{to{opacity:.3}}

/* MODAL EXPORT */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);
  display:flex;align-items:center;justify-content:center;z-index:200}
.modal{background:var(--card);border-radius:10px;padding:20px;
  width:380px;max-width:95vw;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.modal h3{font-size:14px;font-weight:600;margin-bottom:12px}
.mf{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <span class="logo">ROS<span>ELEC</span> · Photo</span>
  <div class="sep"></div>
  <button class="btn btn-ghost on" id="btn-sel" onclick="setMode('select')">✦ Sélect.</button>
  <button class="btn btn-ghost" id="btn-cable" onclick="setMode('cable')">〜 Câble</button>
  <button class="btn btn-ghost" id="btn-text" onclick="setMode('text')">T Texte</button>
  <div class="sep"></div>
  <button class="btn btn-ghost" onclick="undo()">↩</button>
  <button class="btn btn-ghost" onclick="clearAll()">🗑</button>
  <div class="sep"></div>
  <button class="btn btn-ghost" onclick="saveLocal()">💾 Sauver</button>
  <button class="btn btn-yellow" onclick="showExport()">📄 Export</button>
  <button class="btn btn-green" onclick="shareWA()">📲 WhatsApp</button>
  <span class="badge-mode" id="mode-badge">Sélection</span>
</div>

<div class="body">

<!-- BIBLIOTHÈQUE -->
<div class="lib">
  <div class="lib-tabs">
    <div class="ltab sel" id="tab-dc" onclick="showTab('dc')">DC</div>
    <div class="ltab" id="tab-ac" onclick="showTab('ac')">AC</div>
    <div class="ltab" id="tab-tx" onclick="showTab('tx')">TX/RD</div>
    <div class="ltab" id="tab-my" onclick="showTab('my')">+Photo</div>
  </div>
  <div class="lib-body" id="lib-body"></div>
</div>

<!-- CANVAS -->
<div class="canvas-wrap" id="cw">
  <div id="cvs"></div>
  <svg id="cvs-svg" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5"
        markerWidth="5" markerHeight="5" orient="auto-start-reverse">
        <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke"
          stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </marker>
    </defs>
    <g id="wires-g"></g>
  </svg>
  <svg class="wire-preview-svg" id="wp-svg" xmlns="http://www.w3.org/2000/svg">
    <line id="wp-line" x1="0" y1="0" x2="0" y2="0"
      stroke="#aaa" stroke-width="2.5" stroke-dasharray="6,3"
      stroke-linecap="round" opacity="0"/>
  </svg>
</div>

<!-- PANNEAU PROPS -->
<div class="props">
  <div class="props-head" id="props-head">Composant</div>
  <div class="props-body" id="props-body">
    <div style="color:var(--text3);font-size:11px;text-align:center;margin-top:20px">
      Cliquer un composant<br>pour éditer
    </div>
  </div>
</div>

</div>

<!-- STATUSBAR -->
<div class="sb">
  <span><span class="sdot idle" id="sdot"></span><span id="stxt">Prêt</span></span>
  <span id="cnt-items" style="color:var(--text3)">0 composant</span>
  <span id="cnt-wires" style="color:var(--text3)">0 câble</span>
  <span style="margin-left:auto;font-size:10px;color:var(--text3)">
    S=sélect · C=câble · T=texte · Suppr=effacer · Ctrl+Z=annuler · Clic droit=annuler câble
  </span>
</div>

<!-- MODAL EXPORT -->
<div class="modal-bg" id="modal-exp" style="display:none">
<div class="modal">
  <h3>Exporter le schéma</h3>
  <div style="margin-bottom:10px">
    <label style="display:block;font-size:11px;color:var(--text3);margin-bottom:3px">Titre</label>
    <input id="ex-title" style="width:100%;padding:5px 8px;border:1px solid var(--border);border-radius:5px;font-size:12px" placeholder="Ex: DCPD PEAGE MOUKONDO">
  </div>
  <div style="margin-bottom:10px">
    <label style="display:block;font-size:11px;color:var(--text3);margin-bottom:3px">Site</label>
    <input id="ex-site" style="width:100%;padding:5px 8px;border:1px solid var(--border);border-radius:5px;font-size:12px" placeholder="Ex: PEAGE MOUKONDO">
  </div>
  <div style="margin-bottom:10px">
    <label style="display:block;font-size:11px;color:var(--text3);margin-bottom:3px">Technicien</label>
    <input id="ex-tech" style="width:100%;padding:5px 8px;border:1px solid var(--border);border-radius:5px;font-size:12px" placeholder="Votre nom">
  </div>
  <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px">
    <button class="btn" style="background:var(--blue);color:#fff;flex:1" onclick="exportPNG()">🖼 PNG</button>
    <button class="btn" style="background:#2E7D32;color:#fff;flex:1" onclick="exportSVGFile()">📄 SVG</button>
    <button class="btn" style="background:var(--bg);flex:1;border:1px solid var(--border)" onclick="exportJSON()">{ } JSON</button>
  </div>
  <div class="mf">
    <button class="btn" style="border:1px solid var(--border)" onclick="document.getElementById('modal-exp').style.display='none'">Fermer</button>
  </div>
</div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════
// BIBLIOTHÈQUE DE COMPOSANTS — SVG réalistes basés sur photos terrain
// ═══════════════════════════════════════════════════════════════════

// Génère le SVG d'un disjoncteur CHNT/HUA JIA/TENGEN
function svgDisj(brand, model, ampere, color='#1565C0', state='ON') {
  const btnColor = state==='ON' ? '#1565C0' : '#555';
  const btnText  = state==='ON' ? 'I·ON' : 'O·OFF';
  const bColor   = brand==='CHNT'?'#1a3f6b':brand==='HUA JIA'?'#7a1a1a':'#1a4a1a';
  return `<svg viewBox="0 0 44 72" xmlns="http://www.w3.org/2000/svg">
    <rect x="1" y="1" width="42" height="70" rx="5" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
    <rect x="3" y="3" width="38" height="66" rx="4" fill="#f0f0f0"/>
    <!-- Marque en haut -->
    <rect x="3" y="3" width="38" height="16" rx="4" fill="${bColor}"/>
    <text x="22" y="12" text-anchor="middle" font-size="7" fill="#fff" font-family="sans-serif" font-weight="700">${brand}</text>
    <text x="22" y="18" text-anchor="middle" font-size="6" fill="rgba(255,255,255,.8)" font-family="sans-serif">${model}</text>
    <!-- Bouton basculeur -->
    <rect x="8" y="22" width="28" height="26" rx="4" fill="${btnColor}"/>
    <rect x="10" y="24" width="24" height="10" rx="3" fill="rgba(255,255,255,.15)"/>
    <text x="22" y="32" text-anchor="middle" font-size="7" fill="#fff" font-family="sans-serif" font-weight="700">${btnText}</text>
    <rect x="14" y="36" width="16" height="8" rx="2" fill="rgba(0,0,0,.2)"/>
    <!-- Bornes vis -->
    <circle cx="14" cy="52" r="4" fill="#ccc" stroke="#999" stroke-width=".5"/>
    <circle cx="30" cy="52" r="4" fill="#ccc" stroke="#999" stroke-width=".5"/>
    <circle cx="14" cy="52" r="2" fill="#888"/>
    <circle cx="30" cy="52" r="2" fill="#888"/>
    <!-- Étiquette ampérage -->
    <rect x="3" y="58" width="38" height="12" rx="0" rx="0 0 4 4" fill="#ddd"/>
    <text x="22" y="67" text-anchor="middle" font-size="7" fill="#333" font-family="sans-serif" font-weight="600">${ampere}</text>
    <!-- Bornes câble -->
    <line x1="22" y1="1" x2="22" y2="3" stroke="#cc0000" stroke-width="3" stroke-linecap="round"/>
    <line x1="22" y1="70" x2="22" y2="72" stroke="#1565C0" stroke-width="3" stroke-linecap="round"/>
  </svg>`;
}

function svgDisj2P(brand, model, ampere) {
  return `<svg viewBox="0 0 76 72" xmlns="http://www.w3.org/2000/svg">
    <rect x="1" y="1" width="74" height="70" rx="5" fill="#e8e8e8" stroke="#bbb" stroke-width="1"/>
    <rect x="3" y="3" width="70" height="66" rx="4" fill="#f0f0f0"/>
    <rect x="3" y="3" width="70" height="16" rx="4" fill="#1a3f6b"/>
    <text x="38" y="12" text-anchor="middle" font-size="7" fill="#fff" font-family="sans-serif" font-weight="700">${brand}</text>
    <text x="38" y="18" text-anchor="middle" font-size="6" fill="rgba(255,255,255,.8)" font-family="sans-serif">${model} · ${ampere}</text>
    <rect x="8" y="22" width="26" height="26" rx="4" fill="#1565C0"/>
    <text x="21" y="32" text-anchor="middle" font-size="7" fill="#fff" font-family="sans-serif" font-weight="700">I·ON</text>
    <rect x="42" y="22" width="26" height="26" rx="4" fill="#1565C0"/>
    <text x="55" y="32" text-anchor="middle" font-size="7" fill="#fff" font-family="sans-serif" font-weight="700">I·ON</text>
    <circle cx="21" cy="52" r="4" fill="#ccc" stroke="#999" stroke-width=".5"/>
    <circle cx="55" cy="52" r="4" fill="#ccc" stroke="#999" stroke-width=".5"/>
    <circle cx="21" cy="52" r="2" fill="#888"/>
    <circle cx="55" cy="52" r="2" fill="#888"/>
    <rect x="3" y="58" width="70" height="12" fill="#ddd"/>
    <text x="38" y="67" text-anchor="middle" font-size="7" fill="#333" font-family="sans-serif" font-weight="600">${ampere} 2P</text>
    <line x1="21" y1="1" x2="21" y2="3" stroke="#cc0000" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="55" y1="1" x2="55" y2="3" stroke="#1a1a8a" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="21" y1="70" x2="21" y2="72" stroke="#1565C0" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="55" y1="70" x2="55" y2="72" stroke="#1565C0" stroke-width="2.5" stroke-linecap="round"/>
  </svg>`;
}

function svgRectifier(model) {
  return `<svg viewBox="0 0 110 52" xmlns="http://www.w3.org/2000/svg">
    <rect x="0" y="0" width="110" height="52" rx="4" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
    <rect x="2" y="2" width="106" height="48" rx="3" fill="#222"/>
    <!-- Ventilateur circulaire -->
    <circle cx="22" cy="26" r="18" fill="#111" stroke="#333" stroke-width="1"/>
    <circle cx="22" cy="26" r="14" fill="none" stroke="#3a3a3a" stroke-width="1"/>
    <circle cx="22" cy="26" r="9" fill="#0a0a0a" stroke="#444" stroke-width="1"/>
    <path d="M22,12 Q26,18 22,26 Q18,18 22,12Z" fill="#333"/>
    <path d="M34,18 Q28,22 22,26 Q26,18 34,18Z" fill="#333"/>
    <path d="M34,34 Q28,30 22,26 Q28,30 34,34Z" fill="#333"/>
    <path d="M22,40 Q18,34 22,26 Q26,34 22,40Z" fill="#333"/>
    <path d="M10,34 Q16,30 22,26 Q16,30 10,34Z" fill="#333"/>
    <path d="M10,18 Q16,22 22,26 Q16,22 10,18Z" fill="#333"/>
    <circle cx="22" cy="26" r="4" fill="#1a1a1a" stroke="#555" stroke-width="1"/>
    <!-- Panel droit -->
    <rect x="46" y="4" width="60" height="44" rx="2" fill="#0d0d0d"/>
    <rect x="48" y="5" width="56" height="10" rx="1" fill="#0a1520"/>
    <text x="76" y="12" text-anchor="middle" font-size="6" fill="#4fc3f7" font-family="sans-serif" font-weight="700">${model}</text>
    <!-- LEDs -->
    <circle cx="54" cy="22" r="3.5" fill="#00ff44" opacity=".85"/>
    <circle cx="64" cy="22" r="3.5" fill="#ff6600" opacity=".7"/>
    <circle cx="74" cy="22" r="3.5" fill="#ff0000" opacity=".3"/>
    <text x="54" y="30" text-anchor="middle" font-size="5" fill="#009922" font-family="sans-serif">AC</text>
    <text x="64" y="30" text-anchor="middle" font-size="5" fill="#cc4400" font-family="sans-serif">DC</text>
    <text x="74" y="30" text-anchor="middle" font-size="5" fill="#888" font-family="sans-serif">ALM</text>
    <!-- Barcode simulé -->
    <rect x="48" y="34" width="56" height="10" rx="1" fill="#0a0a0a"/>
    <text x="76" y="41" text-anchor="middle" font-size="5" fill="#333" font-family="sans-serif">48VDC / 50A</text>
  </svg>`;
}

function svgBattery() {
  return `<svg viewBox="0 0 60 80" xmlns="http://www.w3.org/2000/svg">
    <rect x="1" y="8" width="58" height="70" rx="4" fill="#1a1a3a" stroke="#2a2a5a" stroke-width="1"/>
    <rect x="3" y="10" width="54" height="66" rx="3" fill="#222244"/>
    <rect x="16" y="2" width="10" height="8" rx="2" fill="#cc0000"/>
    <rect x="34" y="2" width="10" height="8" rx="2" fill="#0d0d88"/>
    <text x="21" y="8" text-anchor="middle" font-size="8" fill="#fff" font-family="sans-serif" font-weight="700">+</text>
    <text x="39" y="8" text-anchor="middle" font-size="8" fill="#fff" font-family="sans-serif" font-weight="700">−</text>

// ═══════════════════════════════════════════════════════════════════
// BIBLIOTHÈQUE UI
// ═══════════════════════════════════════════════════════════════════
function showTab(tab) {
  activeTab = tab;
  ['dc','ac','tx','my'].forEach(t => {
    document.getElementById('tab-'+t).classList.toggle('sel', t===tab);
  });
  renderLib();
}

function renderLib() {
  const body = document.getElementById('lib-body');
  body.innerHTML = '';

  if(activeTab === 'my') {
    body.innerHTML = `
      <label class="upload-zone">
        <input type="file" accept="image/*" multiple onchange="addMyPhotos(this.files)">
        <div style="font-size:18px;margin-bottom:4px">📷</div>
        <div>Charger vos photos<br>de composants terrain</div>
      </label>
      <div id="my-photos-list"></div>`;
    renderMyPhotos();
    return;
  }

  const comps = LIBRARY[activeTab] || [];

  // Section câbles
  const cableDiv = document.createElement('div');
  cableDiv.className = 'lib-section';
  cableDiv.innerHTML = `<div class="ls-title">Câble actif</div>
    <div class="cable-pal" id="cable-pal"></div>
    <div class="cb-label" id="cb-label-txt">${activeCable.l}</div>`;
  body.appendChild(cableDiv);
  setTimeout(() => {
    const pal = document.getElementById('cable-pal');
    if(!pal) return;
    CABLES.forEach((c,i) => {
      const d = document.createElement('div');
      d.className = 'cb' + (c.key===activeCable.key?' sel':'');
      d.style.background = c.color;
      d.title = c.l;
      d.onclick = () => {
        activeCable = c;
        document.querySelectorAll('.cb').forEach(x=>x.classList.remove('sel'));
        d.classList.add('sel');
        document.getElementById('cb-label-txt').textContent = c.l;
      };
      pal.appendChild(d);
    });
  }, 10);

  // Composants
  const compDiv = document.createElement('div');
  compDiv.className = 'lib-section';
  compDiv.innerHTML = `<div class="ls-title">Composants ${activeTab.toUpperCase()}</div>`;
  comps.forEach(comp => {
    const card = document.createElement('div');
    card.className = 'comp-card';
    card.draggable = true;
    card.innerHTML = `
      <div class="comp-thumb">${comp.svg}</div>
      <div class="comp-meta">
        <div class="comp-name">${comp.name}</div>
        <div class="comp-ref">${comp.ref}</div>
      </div>`;
    card.addEventListener('click', () => addToCanvas(comp));
    card.addEventListener('dragstart', e => {
      e.dataTransfer.setData('compId', comp.id);
      e.dataTransfer.setData('tab', activeTab);
    });
    compDiv.appendChild(card);
  });
  body.appendChild(compDiv);
}

function renderMyPhotos() {
  const list = document.getElementById('my-photos-list');
  if(!list) return;
  list.innerHTML = '';
  LIBRARY.my.forEach(comp => {
    const card = document.createElement('div');
    card.className = 'comp-card';
    card.innerHTML = `
      <div class="comp-thumb"><img src="${comp.imgSrc}" alt="${comp.name}"></div>
      <div class="comp-meta">
        <div class="comp-name">${comp.name}</div>
        <div class="comp-ref">${comp.ref}</div>
      </div>`;
    card.addEventListener('click', () => addToCanvas(comp, true));
    list.appendChild(card);
  });
}

function addMyPhotos(files) {
  Array.from(files).forEach(f => {
    const reader = new FileReader();
    reader.onload = e => {
      const comp = {
        id: 'my_'+Date.now()+Math.random(),
        name: f.name.replace(/\.[^.]+$/,'').substring(0,18),
        ref: 'Photo terrain',
        w: 80, h: 80,
        isPhoto: true,
        imgSrc: e.target.result,
        svg: null
      };
      LIBRARY.my.push(comp);
      renderMyPhotos();
    };
    reader.readAsDataURL(f);
  });
}

// ═══════════════════════════════════════════════════════════════════
// CANVAS — AJOUTER COMPOSANT
// ═══════════════════════════════════════════════════════════════════
function addToCanvas(comp, isPhoto=false) {
  saveHist();
  const cwR = cw.getBoundingClientRect();
  const cx = snap(cwR.width/2 - comp.w/2);
  const cy = snap(cwR.height/2 - comp.h/2);
  const item = {
    id: uid(),
    libId: comp.id,
    x: cx, y: cy,
    w: comp.w, h: comp.h,
    label: comp.name,
    ref: comp.ref,
    state: 'ok',
    note: '',
    svgContent: isPhoto ? null : comp.svg,
    isPhoto: isPhoto || comp.isPhoto || false,
    imgSrc: comp.imgSrc || null,
  };
  items.push(item);
  renderItem(item);
  updateCounts();
  selectItem(item.id);
}

// RENDER COMPOSANT
// ═══════════════════════════════════════════════════════════════════
function renderItem(item) {
  let el = document.getElementById(item.id);
  if(!el) {
    el = document.createElement('div');
    el.id = item.id;
    el.className = 'canvas-item';
    cvs.appendChild(el);
  }
  el.className = 'canvas-item' + (selectedId===item.id?' selected':'');
  el.style.left = item.x+'px';
  el.style.top  = item.y+'px';
  el.style.width = item.w+'px';

  const stateIcon = {ok:'🟢', warn:'🟡', crit:'🔴'}[item.state] || '';
  const stateClass = {ok:'state-ok', warn:'state-warn', crit:'state-crit'}[item.state] || 'state-ok';

  let imgContent = '';
  if(item.isPhoto && item.imgSrc) {
    imgContent = `<img src="${item.imgSrc}" style="width:${item.w}px;height:${item.h}px;object-fit:cover;display:block;border-radius:5px">`;
  } else {
    imgContent = `<div style="width:${item.w}px;height:${item.h}px">${item.svgContent||''}</div>`;
  }

  el.innerHTML = `
    <div class="ci-img" style="width:${item.w}px;height:${item.h}px">${imgContent}</div>
    <div class="ci-label">${item.label}</div>
    <div class="ci-state ${stateClass}">${stateIcon}</div>
    <button class="ci-del" onclick="deleteItem('${item.id}')">✕</button>`;

  el.addEventListener('mousedown', e => onItemMousedown(e, item.id));
  el.addEventListener('dblclick', e => { e.stopPropagation(); selectItem(item.id); });
}

function renderAllItems() {
  items.forEach(renderItem);
}

// ═══════════════════════════════════════════════════════════════════
// SELECTION
// ═══════════════════════════════════════════════════════════════════
function selectItem(id) {
  selectedId = id;
  renderAllItems();
  renderAllWires();
  const item = items.find(i=>i.id===id);
  if(item) showProps(item);
  else hideProps();
}

function showProps(item) {
  document.getElementById('props-head').textContent = item.label;
  document.getElementById('props-body').innerHTML = `
    <div class="pr"><label>Label</label>
      <input value="${item.label}" oninput="updateItem('${item.id}','label',this.value)"></div>
    <div class="pr"><label>Référence</label>
      <input value="${item.ref||''}" oninput="updateItem('${item.id}','ref',this.value)" placeholder="Ex: CHNT CB-60 C50"></div>
    <div class="pr"><label>État</label>
      <div class="state-select">
        <div class="ss-btn ss-ok ${item.state==='ok'?'active':''}"
          onclick="updateItem('${item.id}','state','ok');renderItem(items.find(x=>x.id==='${item.id}'));showProps(items.find(x=>x.id==='${item.id}'))">✅ OK</div>
        <div class="ss-btn ss-warn ${item.state==='warn'?'active':''}"
          onclick="updateItem('${item.id}','state','warn');renderItem(items.find(x=>x.id==='${item.id}'));showProps(items.find(x=>x.id==='${item.id}'))">⚠️ Dégr.</div>
        <div class="ss-btn ss-crit ${item.state==='crit'?'active':''}"
          onclick="updateItem('${item.id}','state','crit');renderItem(items.find(x=>x.id==='${item.id}'));showProps(items.find(x=>x.id==='${item.id}'))">🔴 HS</div>
      </div></div>
    <div class="pr"><label>Note</label>
      <textarea oninput="updateItem('${item.id}','note',this.value)"
        placeholder="Observations, anomalies...">${item.note||''}</textarea></div>
    <div class="pr"><label>Dimensions</label>
      <div style="display:flex;gap:4px">
        <input type="number" value="${item.w}" min="20" max="300" style="width:48%"
          oninput="updateItem('${item.id}','w',+this.value)">
        <input type="number" value="${item.h}" min="20" max="300" style="width:48%"
          oninput="updateItem('${item.id}','h',+this.value)">
      </div></div>`;
}

function hideProps() {
  document.getElementById('props-head').textContent = 'Composant';
  document.getElementById('props-body').innerHTML = `
    <div style="color:var(--text3);font-size:11px;text-align:center;margin-top:20px">
      Cliquer un composant<br>pour éditer</div>`;
}

function updateItem(id, key, val) {
  const item = items.find(i=>i.id===id);
  if(!item) return;
  item[key] = val;
  if(key==='w'||key==='h') renderItem(item);
}

// ═══════════════════════════════════════════════════════════════════
// MODE
// ═══════════════════════════════════════════════════════════════════
function setMode(m) {
  mode = m;
  cableStart = null;
  wpLine.setAttribute('opacity','0');
  ['sel','cable','text'].forEach(x => document.getElementById('btn-'+x)?.classList.remove('on'));
  document.getElementById('btn-'+m)?.classList.add('on');
  const labels = {select:'Sélection · déplacer', cable:'Tracer câble', text:'Ajouter texte'};
  document.getElementById('mode-badge').textContent = labels[m]||m;
  cw.style.cursor = m==='cable'?'crosshair': m==='text'?'text':'default';
  setStatus(m==='cable'?'Câble '+activeCable.l+' — cliquer point départ':'Prêt');
}

// ═══════════════════════════════════════════════════════════════════
// EVENTS CANVAS
// ═══════════════════════════════════════════════════════════════════
function getCwPos(e) {
  const r = cw.getBoundingClientRect();
  const t = e.touches?.[0]||e;
  return {x:t.clientX-r.left, y:t.clientY-r.top};
}

cw.addEventListener('click', e => {
  if(e.target !== cw && !e.target.closest('#cvs-svg') && !e.target.closest('.wire-preview-svg')) return;

  const pos = getCwPos(e);
  const sx = snap(pos.x), sy = snap(pos.y);

  if(mode === 'cable') {
    if(!cableStart) {
      cableStart = {x:sx, y:sy};
      wpLine.setAttribute('x1',sx); wpLine.setAttribute('y1',sy);
      wpLine.setAttribute('x2',sx); wpLine.setAttribute('y2',sy);
      wpLine.setAttribute('stroke', activeCable.c);
      wpLine.setAttribute('opacity','0.8');
      setStatus('Câble — cliquer point d\'arrivée (clic droit pour annuler)');
    } else {
      if(sx===cableStart.x&&sy===cableStart.y){cableStart=null;wpLine.setAttribute('opacity','0');return;}
      saveHist();
      wires.push({id:uid(), x1:cableStart.x, y1:cableStart.y, x2:sx, y2:sy,
        color:activeCable.c, colorLabel:activeCable.l});
      renderAllWires();
      cableStart={x:sx,y:sy};
      wpLine.setAttribute('x1',sx); wpLine.setAttribute('y1',sy);
      updateCounts();
      setStatus('Câble '+activeCable.l+' — continuer ou clic droit pour terminer');
    }
  } else if(mode === 'text') {
    const txt = prompt('Texte à ajouter :','');
    if(!txt) return;
    saveHist();
    texts.push({id:uid(), x:sx, y:sy, text:txt});
    renderAllTexts();
  } else {
    selectedId = null;
    renderAllItems();
    renderAllWires();
    hideProps();
  }
});

cw.addEventListener('mousemove', e => {
  if(mode==='cable' && cableStart) {
    const pos = getCwPos(e);
    wpLine.setAttribute('x2', snap(pos.x));
    wpLine.setAttribute('y2', snap(pos.y));
  }
  if(dragItem) {
    const pos = getCwPos(e);
    const item = items.find(i=>i.id===dragItem);
    if(item) {
      item.x = snap(pos.x - dragOff.x);
      item.y = snap(pos.y - dragOff.y);
      const el = document.getElementById(item.id);
      if(el) { el.style.left=item.x+'px'; el.style.top=item.y+'px'; }
    }
  }
});

cw.addEventListener('mouseup', () => { dragItem = null; });
cw.addEventListener('contextmenu', e => {
  e.preventDefault();
  cableStart = null;
  wpLine.setAttribute('opacity','0');
  setStatus('Câble annulé');
});

// Drag depuis bibliothèque
cw.addEventListener('dragover', e => e.preventDefault());
cw.addEventListener('drop', e => {
  e.preventDefault();
  const compId = e.dataTransfer.getData('compId');
  const tab = e.dataTransfer.getData('tab');
  const comp = LIBRARY[tab]?.find(c=>c.id===compId);
  if(!comp) return;
  const pos = getCwPos(e);
  saveHist();
  const item = {
    id:uid(), libId:comp.id,
    x:snap(pos.x-comp.w/2), y:snap(pos.y-comp.h/2),
    w:comp.w, h:comp.h,
    label:comp.name, ref:comp.ref, state:'ok', note:'',
    svgContent:comp.svg, isPhoto:comp.isPhoto||false, imgSrc:comp.imgSrc||null
  };
  items.push(item);
  renderItem(item);
  updateCounts();
});

function onItemMousedown(e, id) {
  if(mode !== 'select') return;
  e.stopPropagation();
  saveHist();
  selectItem(id);
  const pos = getCwPos(e);
  const item = items.find(i=>i.id===id);
  dragItem = id;
  dragOff = {x:pos.x-item.x, y:pos.y-item.y};
  e.preventDefault();
}

// ═══════════════════════════════════════════════════════════════════
// WIRES
// ═══════════════════════════════════════════════════════════════════
function renderAllWires() {
  wiresG.innerHTML = '';
  wires.forEach(w => {
    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1',w.x1); line.setAttribute('y1',w.y1);
    line.setAttribute('x2',w.x2); line.setAttribute('y2',w.y2);
    line.setAttribute('stroke',w.color);
    line.setAttribute('stroke-width', selectedId===w.id ? '4' : '2.5');
    line.setAttribute('stroke-linecap','round');
    if(selectedId===w.id) line.setAttribute('stroke-dasharray','8,3');
    line.style.cursor='pointer';
    line.addEventListener('click', () => {
      if(mode==='select'){ selectedId=w.id; renderAllWires(); }
    });
    wiresG.appendChild(line);
  });
  // Labels câbles
  wires.forEach(w => {
    const mx = (w.x1+w.x2)/2, my = (w.y1+w.y2)/2;
    const bg = document.createElementNS('http://www.w3.org/2000/svg','rect');
    const len = w.colorLabel.length*5+8;
    bg.setAttribute('x',mx-len/2); bg.setAttribute('y',my-8);
    bg.setAttribute('width',len); bg.setAttribute('height',14);
    bg.setAttribute('rx','3'); bg.setAttribute('fill',w.color);
    bg.setAttribute('opacity','0.85');
    const txt = document.createElementNS('http://www.w3.org/2000/svg','text');
    txt.setAttribute('x',mx); txt.setAttribute('y',my+2);
    txt.setAttribute('text-anchor','middle');
    txt.setAttribute('font-size','8');
    txt.setAttribute('fill','#fff');
    txt.setAttribute('font-family','sans-serif');
    txt.setAttribute('font-weight','600');
    txt.setAttribute('pointer-events','none');
    txt.textContent = w.colorLabel;
    wiresG.appendChild(bg);
    wiresG.appendChild(txt);
  });
}

function renderAllTexts() {
  // Supprimer anciens textes SVG
  document.querySelectorAll('.canvas-text').forEach(t=>t.remove());
  texts.forEach(t => {
    const txt = document.createElementNS('http://www.w3.org/2000/svg','text');
    txt.setAttribute('x',t.x); txt.setAttribute('y',t.y);
    txt.setAttribute('font-size','12');
    txt.setAttribute('fill','#1a1a1a');
    txt.setAttribute('font-family','sans-serif');
    txt.setAttribute('font-weight','500');
    txt.setAttribute('class','canvas-text');
    txt.setAttribute('cursor','pointer');
    txt.textContent = t.text;
    wiresG.appendChild(txt);
  });
}

// ═══════════════════════════════════════════════════════════════════
// KEYBOARD
// ═══════════════════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA') return;
  if(e.key==='s'||e.key==='S') setMode('select');
  if(e.key==='c'||e.key==='C') setMode('cable');
  if(e.key==='t'||e.key==='T') setMode('text');
  if(e.key==='Delete'||e.key==='Backspace') {
    if(selectedId) { deleteItem(selectedId); deleteWire(selectedId); }
  }
  if(e.ctrlKey&&e.key==='z'){ e.preventDefault(); undo(); }
  if(e.key==='Escape'){ cableStart=null; wpLine.setAttribute('opacity','0'); }
});

function deleteItem(id) {
  saveHist();
  items = items.filter(i=>i.id!==id);
  document.getElementById(id)?.remove();
  selectedId = null;
  hideProps();
  updateCounts();
}

function deleteWire(id) {
  const idx = wires.findIndex(w=>w.id===id);
  if(idx>=0){ saveHist(); wires.splice(idx,1); renderAllWires(); updateCounts(); }
}

function clearAll() {
  if(!confirm('Effacer tout le schéma ?')) return;
  saveHist();
  items=[]; wires=[]; texts=[];
  cvs.innerHTML=''; wiresG.innerHTML='';
  selectedId=null; hideProps(); updateCounts();
}

function undo() {
  if(!history.length){ setStatus('Rien à annuler'); return; }
  const prev = history.pop();
  items=prev.items; wires=prev.wires; texts=prev.texts;
  cvs.innerHTML=''; wiresG.innerHTML='';
  renderAllItems(); renderAllWires(); renderAllTexts();
  selectedId=null; hideProps(); updateCounts();
  setStatus('Annulé','ok');
}

// ═══════════════════════════════════════════════════════════════════
// STATUS / COUNTS
// ═══════════════════════════════════════════════════════════════════
function setStatus(msg, t='idle') {
  document.getElementById('stxt').textContent = msg;
  document.getElementById('sdot').className = 'sdot '+(t==='ok'?'ok':t==='busy'?'busy':'idle');
}

function updateCounts() {
  document.getElementById('cnt-items').textContent = items.length+' composant'+(items.length>1?'s':'');
  document.getElementById('cnt-wires').textContent = wires.length+' câble'+(wires.length>1?'s':'');
}

// ═══════════════════════════════════════════════════════════════════
// SAVE / LOAD
// ═══════════════════════════════════════════════════════════════════
function saveLocal() {
  const data = {items, wires, texts, savedAt: new Date().toISOString()};
  // Sauver sans les gros SVG inline pour alléger
  const light = {...data, items: data.items.map(i=>({...i, svgContent:null}))};
  try {
    localStorage.setItem('roselec_photo_schema', JSON.stringify(light));
    setStatus('Sauvegardé','ok');
    setTimeout(()=>setStatus('Prêt'), 2000);
  } catch(e) { setStatus('Erreur sauvegarde'); }
  window.parent?.postMessage({type:'save_photo_schema', payload:data}, '*');
}

// Auto-save 60s
setInterval(saveLocal, 60000);

window.addEventListener('message', e => {
  if(e.data?.type==='load_photo_schema') loadSchema(e.data.payload);
});

function loadSchema(data) {
  if(!data) return;
  items = data.items || []; wires = data.wires || []; texts = data.texts || [];
  // Restaurer les SVG depuis la bibliothèque
  items.forEach(item => {
    if(!item.svgContent && !item.isPhoto) {
      const allComps = [...LIBRARY.dc,...LIBRARY.ac,...LIBRARY.tx];
      const comp = allComps.find(c=>c.id===item.libId);
      if(comp) item.svgContent = comp.svg;
    }
  });
  cvs.innerHTML=''; wiresG.innerHTML='';
  renderAllItems(); renderAllWires(); renderAllTexts();
  updateCounts();
  setStatus('Schéma chargé','ok');
}

// ═══════════════════════════════════════════════════════════════════
// EXPORT
// ═══════════════════════════════════════════════════════════════════
function showExport() { document.getElementById('modal-exp').style.display='flex'; }

function buildExportSVG() {
  const title = document.getElementById('ex-title').value || 'Schéma photo-réaliste';
  const site  = document.getElementById('ex-site').value  || '';
  const tech  = document.getElementById('ex-tech').value  || '';
  const now   = new Date().toLocaleDateString('fr-FR');

  // Calculer bounding box
  let minX=9999,minY=9999,maxX=0,maxY=0;
  items.forEach(i=>{ minX=Math.min(minX,i.x); minY=Math.min(minY,i.y); maxX=Math.max(maxX,i.x+i.w); maxY=Math.max(maxY,i.y+i.h+24); });
  wires.forEach(w=>{ minX=Math.min(minX,w.x1,w.x2); minY=Math.min(minY,w.y1,w.y2); maxX=Math.max(maxX,w.x1,w.x2); maxY=Math.max(maxY,w.y1,w.y2); });
  if(minX===9999){minX=0;minY=0;maxX=600;maxY=400;}
  const pad=40, W=maxX-minX+pad*2, H=maxY-minY+pad*2+56;
  const dx=pad-minX, dy=pad-minY+56;

  // Construire le SVG des items (sans photos base64 pour SVG)
  let itemsSVG = '';
  items.forEach(item => {
    if(!item.isPhoto && item.svgContent) {
      itemsSVG += `<g transform="translate(${item.x+dx},${item.y+dy})">${item.svgContent}</g>`;
      itemsSVG += `<text x="${item.x+dx+item.w/2}" y="${item.y+dy+item.h+14}"
        text-anchor="middle" font-size="10" fill="#333" font-family="sans-serif">${item.label}</text>`;
    }
  });

  // Câbles
  let wiresSVG = '';
  wires.forEach(w => {
    wiresSVG += `<line x1="${w.x1+dx}" y1="${w.y1+dy}" x2="${w.x2+dx}" y2="${w.y2+dy}"
      stroke="${w.color}" stroke-width="2.5" stroke-linecap="round"/>`;
    const mx=(w.x1+w.x2)/2+dx, my=(w.y1+w.y2)/2+dy;
    const len=w.colorLabel.length*5+8;
    wiresSVG += `<rect x="${mx-len/2}" y="${my-8}" width="${len}" height="14" rx="3" fill="${w.color}" opacity=".85"/>`;
    wiresSVG += `<text x="${mx}" y="${my+2}" text-anchor="middle" font-size="8" fill="#fff" font-family="sans-serif" font-weight="600">${w.colorLabel}</text>`;
  });

  return `<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">
  <rect width="${W}" height="${H}" fill="#f8f9fa"/>
  <rect width="${W}" height="52" fill="#1565C0"/>
  <text x="16" y="22" font-size="15" fill="#fff" font-family="sans-serif" font-weight="800">ROSELEC — ${title}</text>
  <text x="16" y="40" font-size="10" fill="rgba(255,255,255,.75)" font-family="sans-serif">${site} · ${tech} · ${now}</text>
  ${wiresSVG}
  ${itemsSVG}
</svg>`;
}

function exportPNG() {
  const svg = buildExportSVG();
  const img = new Image();
  img.onload = () => {
    const c = document.createElement('canvas');
    c.width=img.width*2; c.height=img.height*2;
    const ctx=c.getContext('2d'); ctx.scale(2,2); ctx.drawImage(img,0,0);
    const a=document.createElement('a');
    a.href=c.toDataURL('image/png');
    a.download='roselec_schema_'+Date.now()+'.png'; a.click();
    setStatus('PNG exporté','ok');
  };
  img.src=URL.createObjectURL(new Blob([svg],{type:'image/svg+xml'}));
  document.getElementById('modal-exp').style.display='none';
}

function exportSVGFile() {
  const svg = buildExportSVG();
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([svg],{type:'image/svg+xml'}));
  a.download='roselec_schema_'+Date.now()+'.svg'; a.click();
  setStatus('SVG exporté','ok');
  document.getElementById('modal-exp').style.display='none';
}

function exportJSON() {
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([JSON.stringify({items,wires,texts},null,2)],{type:'application/json'}));
  a.download='roselec_schema_'+Date.now()+'.json'; a.click();
  document.getElementById('modal-exp').style.display='none';
}
