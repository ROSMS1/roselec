<!--
  ROSELEC photo_editor.html — Patch v2.1
  ========================================
  Pour appliquer: remplacer </body></html> à la fin de photo_editor.html
  par le contenu de ce fichier.
  
  Corrige:
  - Export PNG tronqué (bounding box incorrect)
  - Vraies photos non incluses dans l'export (href base64)
  - Canvas trop petit (PAD=60, HDR=56)
  - Composants coupés en dehors du canvas
-->


<!-- ROSELEC PATCH v2.1 - Fixed exportPNG + buildSVG -->
<script>
// Override buildSVG with corrected bounding box + photo embedding
function buildSVG(){
  const title=document.getElementById('ex-t').value||'Schéma ROSELEC';
  const site=document.getElementById('ex-s').value||'';
  const tech=document.getElementById('ex-tech').value||'';
  const now=new Date().toLocaleDateString('fr-FR');
  let mnX=Infinity,mnY=Infinity,mxX=-Infinity,mxY=-Infinity;
  items.forEach(i=>{
    mnX=Math.min(mnX,i.x); mnY=Math.min(mnY,i.y);
    mxX=Math.max(mxX,i.x+(i.w||80)); mxY=Math.max(mxY,i.y+(i.h||60)+30);
  });
  wires.forEach(w=>{
    mnX=Math.min(mnX,w.x1,w.x2); mnY=Math.min(mnY,w.y1,w.y2);
    mxX=Math.max(mxX,w.x1,w.x2); mxY=Math.max(mxY,w.y1,w.y2);
  });
  textItems.forEach(t=>{ mnX=Math.min(mnX,t.x-4); mnY=Math.min(mnY,t.y-20); mxX=Math.max(mxX,t.x+200); mxY=Math.max(mxY,t.y+20); });
  if(!isFinite(mnX)){mnX=0;mnY=0;mxX=500;mxY=300;}
  const PAD=60,HDR=56;
  const W=Math.max(600,Math.ceil(mxX-mnX+PAD*2));
  const H=Math.max(400,Math.ceil(mxY-mnY+PAD*2+HDR));
  const dx=PAD-mnX, dy=PAD-mnY+HDR;
  let isvg='',wsvg='';
  wires.forEach(w=>{
    let lbl=w.colorLabel||'';
    if(w.section)lbl+=' · '+w.section;
    if(w.distance)lbl+=' · '+w.distance;
    const x1=Math.round(w.x1+dx),y1=Math.round(w.y1+dy),x2=Math.round(w.x2+dx),y2=Math.round(w.y2+dy);
    wsvg+=`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${w.color}" stroke-width="3" stroke-linecap="round"/>`;
    if(lbl){const mx=(x1+x2)/2,my=(y1+y2)/2,bw=lbl.length*5.5+8;
      wsvg+=`<rect x="${mx-bw/2}" y="${my-8}" width="${bw}" height="14" rx="3" fill="${w.color}" opacity=".9"/>`;
      wsvg+=`<text x="${mx}" y="${my+3}" text-anchor="middle" font-size="8" fill="#fff" font-family="sans-serif" font-weight="700">${lbl}</text>`;}
  });
  items.forEach(item=>{
    const cx=Math.round(item.x+dx),cy=Math.round(item.y+dy),iw=item.w||80,ih=item.h||60;
    const lbl=item.label+(item.ampere?' · '+item.ampere:'');
    if(item.isPhoto&&item.imgSrc){
      isvg+=`<image href="${item.imgSrc}" xlink:href="${item.imgSrc}" x="${cx}" y="${cy}" width="${iw}" height="${ih}" preserveAspectRatio="xMidYMid meet"/>`;
      isvg+=`<rect x="${cx}" y="${cy}" width="${iw}" height="${ih}" rx="4" fill="none" stroke="rgba(80,80,80,.5)" stroke-width="1"/>`;
    } else if(item.svgContent){
      isvg+=`<g transform="translate(${cx},${cy})">${item.svgContent}</g>`;
    }
    const lw=lbl.length*5.5+10;
    isvg+=`<rect x="${cx+iw/2-lw/2}" y="${cy+ih+2}" width="${lw}" height="14" fill="rgba(0,0,0,.78)" rx="3"/>`;
    isvg+=`<text x="${cx+iw/2}" y="${cy+ih+12}" text-anchor="middle" font-size="9" fill="#fff" font-family="sans-serif" font-weight="700">${lbl}</text>`;
    if(item.state&&item.state!=='ok'){
      const sc={warn:'#EF6C00',crit:'#C62828'}[item.state]||'#888';
      const st={warn:'⚠',crit:'✕'}[item.state]||'?';
      isvg+=`<circle cx="${cx+iw-6}" cy="${cy+6}" r="7" fill="${sc}"/>`;
      isvg+=`<text x="${cx+iw-6}" y="${cy+10}" text-anchor="middle" font-size="8" fill="#fff" font-family="sans-serif">${st}</text>`;}
  });
  textItems.forEach(t=>{
    isvg+=`<text x="${Math.round(t.x+dx)}" y="${Math.round(t.y+dy)}" font-size="${t.size||12}" fill="#1a1a1a" font-family="sans-serif" font-weight="600">${t.text}</text>`;
  });
  return `<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">
  <rect width="${W}" height="${H}" fill="#f8f9fa"/>
  <rect width="${W}" height="${HDR}" fill="#1565C0"/>
  <text x="16" y="24" font-size="15" fill="#fff" font-family="sans-serif" font-weight="800">ROSELEC — ${title}</text>
  <text x="16" y="42" font-size="10" fill="rgba(255,255,255,.8)" font-family="sans-serif">${[site,tech?'Tech: '+tech:'',now].filter(Boolean).join(' · ')}</text>
  ${wsvg}${isvg}
  <text x="${W-8}" y="${H-6}" text-anchor="end" font-size="8" fill="rgba(0,0,0,.25)" font-family="sans-serif">ROSELEC · MTN Congo Zone Sud</text>
</svg>`;
}

// Override exportPNG with corrected canvas export
async function exportPNG(){
  document.getElementById('mo-exp').style.display='none';
  setStatus('Calcul du schéma…','busy');
  const svg=buildSVG();
  const parser=new DOMParser();
  const doc=parser.parseFromString(svg,'image/svg+xml');
  const svgEl=doc.querySelector('svg');
  const W=parseFloat(svgEl?.getAttribute('width')||'800');
  const H=parseFloat(svgEl?.getAttribute('height')||'600');
  console.log('[ROSELEC Photo] Export PNG',W,'x',H,'composants:',items.length);
  const SCALE=2;
  const canvas=document.createElement('canvas');
  canvas.width=Math.round(W*SCALE); canvas.height=Math.round(H*SCALE);
  const ctx=canvas.getContext('2d'); ctx.scale(SCALE,SCALE);
  const blob=new Blob([svg],{type:'image/svg+xml;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const img=new Image();
  img.onload=()=>{
    ctx.drawImage(img,0,0,W,H);
    URL.revokeObjectURL(url);
    canvas.toBlob(pngBlob=>{
      if(!pngBlob){setStatus('Erreur PNG','idle');return;}
      const a=document.createElement('a');
      a.href=URL.createObjectURL(pngBlob);
      const site=(document.getElementById('ex-s').value||'schema').replace(/\s+/g,'_');
      a.download=`ROSELEC_${site}_${Date.now()}.png`;
      a.click();
      setStatus(`✅ PNG ${Math.round(W)}×${Math.round(H)}px — ${items.length} composant(s)·${wires.length} câble(s)`,'ok');
    },'image/png');
  };
  img.onerror=()=>{URL.revokeObjectURL(url);setStatus('Erreur rendu — utilisez Export SVG','idle');};
  img.src=url;
  try{window.parent.postMessage({type:'streamlit:setComponentValue',value:{svg_export:svg}},'*');}catch(e){}
}
</script>
</body>
</html>
